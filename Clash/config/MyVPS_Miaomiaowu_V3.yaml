proxy-groups:
  - name: "🚀 节点选择"
    type: select
    proxies:
      - "🇭🇰 香港"
      - "🇭🇰 HK-10M"
      - "🇯🇵 日本"
      - "🇺🇸 美西"
      - "🇺🇸 美东"
      - "🇰🇷 韩国"
      - "🇩🇪 德国"
      - "Dmit"
      - "默认出口 自动"

  - name: "🤖 AI"
    type: select
    proxies:
      - "🇯🇵 日本 自动"
      - "🇰🇷 韩国 自动"
      - "🇺🇸 美西 自动"
      - "🇺🇸 美东 自动"
      - "🇩🇪 德国 自动"
      - "🇭🇰 香港"
      - "🇭🇰 HK-10M"
      - "🇰🇷 韩国"
      - "🇺🇸 美西"
      - "🇯🇵 日本"
      - "🇺🇸 美东"
      - "🇩🇪 德国"
      - "Dmit"
      - "🚀 节点选择"
      - "默认出口 自动"
      - "DIRECT"

  - name: "🎬 Streaming"
    type: select
    proxies:
      - "🇺🇸 美西 自动"
      - "🇯🇵 日本 自动"
      - "🇰🇷 韩国 自动"
      - "🇺🇸 美东 自动"
      - "🇩🇪 德国 自动"
      - "🇭🇰 香港"
      - "🇭🇰 HK-10M"
      - "🇰🇷 韩国"
      - "🇺🇸 美西"
      - "🇯🇵 日本"
      - "🇺🇸 美东"
      - "🇩🇪 德国"
      - "Dmit"
      - "🚀 节点选择"
      - "默认出口 自动"
      - "DIRECT"

  - name: "默认出口 自动"
    type: fallback
    include-all-proxies: true
    filter: 'HK-HN|Hong\s*Kong|香港|\bHK\b|HK-10M|10M|BaiMao|Baimao|BaiCat|Baicat|JP-NoB|NoB|Nobrand|JP-IIJ|IIJ|US-HDZ|HDZ|HostDZire|US-RAB|RAB|Rabbit|Rabisu|US-CHI|CHI|Chicago|KR-ALI|Korea|Seoul|韩国|\bKR\b|DE-HF|Germany|德国|\bDE\b|Malibu|Dmit|DMIT|hr0p5tibas'
    url: https://www.gstatic.com/generate_204
    interval: 60
    tolerance: 10

  - name: "🇭🇰 香港"
    type: select
    include-all-proxies: true
    filter: 'HK-HN|Hong\s*Kong|香港|\bHK\b'

  - name: "🇭🇰 HK-10M"
    type: select
    include-all-proxies: true
    filter: 'HK-10M|10M|BaiMao|Baimao|BaiCat|Baicat'

  - name: "🇯🇵 日本"
    type: select
    proxies:
      - "🇯🇵 日本 自动"
    include-all-proxies: true
    filter: 'JP-NoB|NoB|Nobrand|JP-IIJ|IIJ'

  - name: "🇺🇸 美西"
    type: select
    proxies:
      - "🇺🇸 美西 自动"
    include-all-proxies: true
    filter: 'US-HDZ|HDZ|HostDZire|US-RAB|RAB|Rabbit|Rabisu'

  - name: "🇺🇸 美东"
    type: select
    proxies:
      - "🇺🇸 美东 自动"
    include-all-proxies: true
    filter: 'US-CHI|CHI|Chicago'

  - name: "🇰🇷 韩国"
    type: select
    proxies:
      - "🇰🇷 韩国 自动"
    include-all-proxies: true
    filter: 'KR-ALI|Korea|Seoul|韩国|\bKR\b'

  - name: "🇩🇪 德国"
    type: select
    proxies:
      - "🇩🇪 德国 自动"
    include-all-proxies: true
    filter: 'DE-HF|Germany|德国|\bDE\b'

  - name: "Dmit"
    type: select
    include-all-proxies: true
    filter: 'Malibu|Dmit|DMIT|hr0p5tibas'

  - name: "🇯🇵 日本 自动"
    type: url-test
    include-all-proxies: true
    filter: 'JP-NoB|NoB|Nobrand'
    url: https://www.gstatic.com/generate_204
    interval: 60
    tolerance: 10

  - name: "🇺🇸 美西 自动"
    type: url-test
    include-all-proxies: true
    filter: 'US-HDZ|HDZ|HostDZire|US-RAB|RAB|Rabbit|Rabisu'
    url: https://www.gstatic.com/generate_204
    interval: 60
    tolerance: 10

  - name: "🇺🇸 美东 自动"
    type: url-test
    include-all-proxies: true
    filter: 'US-CHI|CHI|Chicago'
    url: https://www.gstatic.com/generate_204
    interval: 60
    tolerance: 10

  - name: "🇰🇷 韩国 自动"
    type: url-test
    include-all-proxies: true
    filter: 'KR-ALI|Korea|Seoul|韩国|\bKR\b'
    url: https://www.gstatic.com/generate_204
    interval: 60
    tolerance: 10

  - name: "🇩🇪 德国 自动"
    type: url-test
    include-all-proxies: true
    filter: 'DE-HF|Germany|德国|\bDE\b'
    url: https://www.gstatic.com/generate_204
    interval: 60
    tolerance: 10

